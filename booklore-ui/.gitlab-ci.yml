workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'
      when: always
    - when: never

include:
  - component: "$CI_SERVER_FQDN/to-be-continuous/node/gitlab-ci-node@5.1.2"
    inputs:
      image: "docker.io/library/node:22"
      manager: "npm"
      project-dir: "booklore-ui"
      lint-enabled: false
      lint-args: "--format=gitlab --max-warnings=0"
      audit-disabled: true
      semgrep-disabled: true
  #  - component: "$CI_SERVER_FQDN/to-be-continuous/gitleaks/gitlab-ci-gitleaks@2.9"
  # Spectral disabled - no static OpenAPI/AsyncAPI specs to lint
  # - component: "$CI_SERVER_FQDN/to-be-continuous/spectral/gitlab-ci-spectral@1.4"

node-build:
  tags:
    - universal
  rules:
    - if: "$CI_COMMIT_TAG"
      when: never
    - when: on_success

